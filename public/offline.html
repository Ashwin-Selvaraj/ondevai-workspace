<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnDevAI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080e;
      color: #e8e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: #6d5df0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #9494a8; font-size: 14px; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }
    a {
      display: inline-block;
      background: #6d5df0;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
    }
    a:hover { background: #7c6af7; }
  </style>
</head>
<body>
  <div>
    <div class="logo">⚡</div>
    <h1>You're offline</h1>
    <p>OnDevAI runs entirely in your browser — once the app shell and model are cached, everything works offline. Visit when connected to cache the app first.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
